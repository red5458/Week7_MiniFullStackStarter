<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 10 | Updated Advanced Database Integration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-charcoal border-bottom-green">
        <div class="container">
            <a class="navbar-brand mono" href="#">WEEK 10: UPDATED ADVANCED DATABASE INTEGRATION</a>
        </div>
    </nav>

    <main class="container py-5">

        <!-- Users -->
        <div class="row g-4 mb-4">
            <div class="col-lg-5">
                <div class="main-card shadow-sm">
                    <h5 class="mono fw-bold mb-4">// ADD USER</h5>
                    <form id="userForm">
                        <div class="mb-3">
                            <label class="form-label small mono text-green">Full Name</label>
                            <input class="form-control rounded-0" name="name" required placeholder="">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small mono text-green">Email Address</label>
                            <input class="form-control rounded-0" name="email" type="email" required placeholder="">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small mono text-green">Age (optional)</label>
                            <input class="form-control rounded-0" name="age" type="number" min="1" placeholder="">
                        </div>
                        <button class="btn btn-green w-100 rounded-0 fw-bold" type="submit">SAVE</button>
                    </form>
                    <div id="msg" class="mt-3"></div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="main-card shadow-sm h-100">
                    <h5 class="mono fw-bold mb-4">// USER LIST</h5>
                    <div id="userList" class="list-group list-group-flush small"></div>
                </div>
            </div>
        </div>

        <!-- Added a row for Orders  -->
        <div class="row g-4">
            <div class="col-12">
                <div class="main-card shadow-sm">
                    <h5 class="mono fw-bold mb-2">// ORDER LIST</h5>
                    <div id="orderList" class="list-group list-group-flush small"></div>
                </div>
            </div>
        </div>

    </main>

    <footer class="text-center py-4 bg-charcoal text-white mt-5">
        <p class="small mb-0">IT 112 - Web Systems & Technologies</p>
        <p class="small text-secondary">&copy; 2026 Paul Orlando Red</p>
    </footer>

    <script src="/js/app.js"></script>
</body>

</html>
